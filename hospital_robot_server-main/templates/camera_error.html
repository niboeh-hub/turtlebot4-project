<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Error</title>
<style>
    /* =============================================================================
       [CSS] 공통 레이아웃 및 사이드바 스타일
       ============================================================================= */
    
    /* 화면 전체 설정: 여백 제거, 폰트 설정, 플렉스 박스로 사이드바와 메인 구분 */
    body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; background-color: #f3f4f6; }
    
    /* 왼쪽 사이드바: 파란색 배경, 세로 정렬 */
    .sidebar {
        width: 220px;
        background-color: #0f3f8a;
        color: white;
        display: flex;
        flex-direction: column;
        padding-top: 20px;
    }
    /* 사이드바 메뉴 링크: 밑줄 제거 및 여백 설정 */
    .sidebar a {
        padding: 15px;
        color: white;
        text-decoration: none;
        display: block;
    }
    
    /* 메인 콘텐츠 영역: 사이드바 제외 나머지 공간 차지, 내용 정중앙 배치 */
    .main { flex: 1; padding: 50px; display: flex; justify-content: center; align-items: center; }

    /* =============================================================================
       [CSS] 에러 카드 및 알림 디자인
       ============================================================================= */

    /* 에러 카드: 흰색 배경, 둥근 모서리, 그림자 효과 */
    .error-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 500px;
        width: 100%;
    }

    /* 카메라 아이콘/이미지 스타일: 크기 조절 및 투명도 설정 */
    .no-camera-img {
        width: 200px;
        height: auto;
        margin-bottom: 25px;
        opacity: 0.7; 
    }

    /* 카메라 뷰어 영역: 검은색 배경의 비디오 출력 창 */
    #camera-view {
        flex: 1;
        height: 360px;
        background: #111;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    /* 실제 카메라 영상 이미지: 뷰어 크기에 맞춤, 기본은 숨김 상태 */
    #stream-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: none;
    }

    /* 화면 없음(No Screen) 메시지 영역: 기본은 숨김 상태 */
    #no-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: #555;
    }
    /* 아이콘, 제목, 부제목 각각의 크기와 투명도 설정 */
    #no-screen .icon { font-size: 3rem; opacity: 0.4; }
    #no-screen .title { font-size: 1rem; font-weight: bold; color: #777; }
    #no-screen .sub { font-size: 0.78rem; color: #aaa; text-align: center; line-height: 1.6; }

    /* 연결 중 로딩 표시 영역 */
    #cam-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        color: #aaa;
    }
    /* 회전하는 스피너 애니메이션 제작 */
    .spinner {
        width: 36px; height: 36px;
        border: 4px solid #333;
        border-top-color: #1759bb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    /* 스피너 회전 각도 정의 */
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* 에러 메시지 제목: 붉은색 강조 */
    .error-msg {
        color: #d32f2f;
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* 에러 메시지 설명: 회색 텍스트 */
    .error-sub {
        color: #666;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    /* 다시 시도 버튼: 파란색 배경, 마우스 오버 시 효과 */
    .btn-retry {
        background-color: #1759bb;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn-retry:hover { background-color: #0f3f8a; transform: translateY(-2px); }
</style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center;">🏥 Hospital</h2>
    <a href="{{ url_for('main') }}">대시보드</a>
    <a href="{{ url_for('patient') }}">환자</a>
    <a href="{{ url_for('robot_status') }}">로봇 상태</a>
    <a href="{{ url_for('camera') }}">실시간 카메라</a>
    <a href="{{ url_for('robot_plan') }}">순찰 계획</a>
        <a href="{{ url_for('patrol_control') }}">순찰 실행</a>
</div>

<div class="main">
    <div class="error-card">
        
        <div style="background:#f8f9ff; border-radius:8px; padding:20px; display:flex; flex-direction:column; gap:10px;">

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-size:0.75rem; color:#aaa;">📷 웹캠 카메라</div>
                <span id="cam-badge" class="cam-badge checking">⏳ 확인 중</span>
            </div>

            <div id="camera-view">
                <div id="cam-loading">
                    <div class="spinner"></div>
                    <div style="font-size:0.8rem;">연결 시도 중...</div>
                </div>
                
                <img id="stream-img"
                        src="/stream/robot1/camera"
                        alt="카메라 스트림"
                        onerror="showNoScreen()">
                
                <div id="no-screen">
                    <div class="icon">📵</div>
                    <div class="title">no screen available</div>
                    <div class="sub">카메라 토픽을 수신할 수 없습니다.</div>
                </div>
            </div>

        </div>
        
        <p class="error-sub">
            카메라 장치 연결 상태를 확인해 주세요.<br>
            장치가 분리되었거나 다른 프로그램에서 사용 중일 수 있습니다.
        </p>
    </div>
</div>

    <script src="/static/emergency_popup.js"></script>
</body>
</html>
